name: CI quality + telegram

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

jobs:
  quality:
    if: github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/ticket-')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8 and save report
        id: flake8
        run: |
          mkdir -p reports
          set +e
          flake8 . > reports/flake8_report.txt
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flake8-report
          path: reports/flake8_report.txt

      - name: Fail if flake8 found issues
        if: steps.flake8.outputs.exit_code != '0'
        run: exit 1

  telegram_notify:
    needs: quality
    if: always() && github.event.pull_request.merged == true && startsWith(github.head_ref, 'feature/ticket-')
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram message
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE_NOW="$(date '+%Y-%m-%d %H:%M:%S')"
          REPO_NAME="land_devops22"
          GIT_TAG="v.17.24"

          if [ "$QUALITY_RESULT" = "success" ]; then
            TITLE_TEXT="Новый выпуск изменений"
            STATUS_TEXT="✅ Успешно"
            EXTRA_TEXT="Сборка и проверка качества кода завершены успешно."
          else
            TITLE_TEXT="Ошибка проверки изменений"
            STATUS_TEXT="❌ Ошибка"
            EXTRA_TEXT="Во время проверки были обнаружены замечания."
          fi

          TEXT=$(printf '%s\n' \
            '<b>GITHUB DEVOPS BOT</b>' \
            "$TITLE_TEXT" \
            '' \
            "<b>Проект:</b> <code>$REPO_NAME</code>" \
            "<b>Версия:</b> <code>$GIT_TAG</code>" \
            "<b>Дата:</b> <code>$DATE_NOW</code>" \
            "<b>Статус pipeline:</b> <code>$STATUS_TEXT</code>" \
            '' \
            "$EXTRA_TEXT" \
            '' \
            '<b>Информация о Git-репозитории</b>' \
            '' \
            "<b>Repository:</b> <code>$REPOSITORY</code>" \
            "<b>PR:</b> <code>#$PR_NUMBER</code>" \
            "<b>Название PR:</b> <code>$PR_TITLE</code>" \
            "<b>Ветка:</b> <code>$HEAD_REF -&gt; $BASE_REF</code>" \
            "<b>Git tag:</b> <code>$GIT_TAG</code>" \
            "<b>Commit SHA:</b> <code>$COMMIT_SHA</code>" \
            '' \
            '<b>Информация о Docker-репозитории</b>' \
            '' \
            '<b>Владелец:</b> <code>simran</code>' \
            '<b>Название:</b> <code>land_devops22</code>' \
            '<b>Полное имя:</b> <code>simran/land_devops22:v.17.24</code>' \
            '' \
            '<b>Ссылка на workflow:</b>' \
            "$RUN_URL")

          RESP=$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=${TEXT}")

          echo "$RESP"
          echo "$RESP" | grep -q '"ok":true' || exit 1
